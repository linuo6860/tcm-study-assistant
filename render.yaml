services:
  - type: web
    name: tcm-study-assistant-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://linuo6860.github.io
      - key: TCM_STORAGE_DIR
        value: /tmp/tcm-study-assistant
      - key: TCM_UPLOAD_DIR
        value: /tmp/tcm-study-assistant/uploads
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: OCR_PROVIDER
        value: baidu
      - key: BAIDU_OCR_ENDPOINT
        value: general_basic
      - key: BAIDU_OCR_TIMEOUT
        value: "90"
      - key: OCR_DEVICE
        value: cpu
      - key: OCR_MAX_IMAGE_SIDE
        value: "1600"
      - key: OCR_CPU_THREADS
        value: "2"
      - key: OCR_BACKGROUND_WARMUP
        value: "true"
      - key: DISABLE_MODEL_SOURCE_CHECK
        value: "True"
      - key: ANSWER_MODE
        value: hybrid
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LLM_TIMEOUT
        value: "60"
      - key: LLM_MAX_TOKENS
        value: "1600"
      - key: LLM_TEMPERATURE
        value: "0.2"
